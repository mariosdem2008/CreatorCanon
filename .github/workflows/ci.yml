name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs on the same PR when a new commit lands. We never
# cancel main-branch runs — those are the record of what was shipped.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '20.11.0'
  PNPM_VERSION: '9.12.0'
  TURBO_TELEMETRY_DISABLED: '1'

# Workflow-level defaults inherited by every job. The `globstar` shell option
# lets bash expand `src/**/*.test.ts` patterns — without it, package.json's
# test scripts pass the literal `**` to `node --test` and Node 20 reports
# "Could not find 'src/**/*.test.ts'".
defaults:
  run:
    shell: bash --noprofile --norc -eo pipefail -O globstar {0}

jobs:
  checks:
    name: typecheck / lint / test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail-fast ordering: typecheck -> lint -> test. A typecheck break is the
      # cheapest signal; no point running ESLint if tsc is already red.
      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  build:
    name: build
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: |
            apps/web/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/**/*.[jt]s', 'apps/web/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-next-

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build
        run: pnpm build

  e2e:
    name: e2e (prod smokes)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @creatorcanon/web exec playwright install --with-deps chromium

      # Runs against creatorcanon-saas.vercel.app — only the prod-compatible
      # specs (no dev-bypass sign-in, no local DB writes). Task 9's
      # edit-then-publish spec is gated behind a sign-in and stays excluded
      # here; CI will pick it up when we add an authenticated-prod harness.
      - name: Run prod-safe specs against creatorcanon-saas.vercel.app
        env:
          E2E_EXTERNAL: 'true'
          E2E_BASE_URL: 'https://creatorcanon-saas.vercel.app'
        run: |
          pnpm --filter @creatorcanon/web exec playwright test \
            --grep "Request access page accepts an email|Public /pricing renders single-tier copy"

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7
