name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs on the same PR when a new commit lands. We never
# cancel main-branch runs — those are the record of what was shipped.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '20.11.0'
  PNPM_VERSION: '9.12.0'
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  checks:
    name: typecheck / lint / test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: SaaS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: SaaS/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail-fast ordering: typecheck -> lint -> test. A typecheck break is the
      # cheapest signal; no point running ESLint if tsc is already red.
      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  build:
    name: build
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: SaaS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: SaaS/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            SaaS/apps/web/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('SaaS/pnpm-lock.yaml') }}-${{ hashFiles('SaaS/apps/web/**/*.[jt]s', 'SaaS/apps/web/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('SaaS/pnpm-lock.yaml') }}-
            ${{ runner.os }}-next-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: SaaS/.turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build
        run: pnpm build
