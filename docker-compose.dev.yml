services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: creatorcanon-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: creatorcanon
    ports:
      - "54329:5432"
    volumes:
      - creatorcanon-postgres-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d creatorcanon"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  creatorcanon-postgres-dev:
